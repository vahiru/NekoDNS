name = "nekodns"
main = "src/worker/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "nekodns"
database_id = "91a53769-7741-4c16-8e6d-000f2bccf099"
migrations_dir = "migrations"

[[queues.producers]]
binding = "JOB_QUEUE"
queue = "nekodns-jobs"

[[queues.consumers]]
queue = "nekodns-jobs"
max_batch_size = 10
max_batch_timeout = 30

[[send_email]]
name = "MAILER"
destination_address = "admin@is-cute.cat"

[triggers]
crons = ["*/5 * * * *"]

[vars]
PARENT_DOMAIN = "is-cute.cat"
EMAIL_FROM = "noreply@is-cute.cat"
APP_ORIGIN = "https://everyone.is-cute.cat"
TURNSTILE_SITE_KEY = "0x4AAAAAADD9qKWUjuttcy57IWJlGU8r_nQ"
